generations:
  - name: "First Generation (Originally Hyundai Genesis)"
    start_year: 2008
    end_year: 2016
    description: "The first-generation G80 began life as the Hyundai Genesis sedan before the Genesis luxury brand was established. Built on Hyundai's newly developed rear-wheel drive platform, it represented the company's first serious attempt to enter the luxury market. The exterior featured conservative styling influenced by European luxury sedans, while the interior offered genuine luxury appointments and technology at a value price point. Initially available with a 3.8L V6 or a 4.6L V8 (later a 5.0L V8), it emphasized smooth performance and comfort over sporty handling. A significant refresh in 2012 updated the styling and technology features. This generation established the foundation for what would become the Genesis brand, demonstrating Hyundai's ability to create a credible luxury vehicle."

  - name: "Second Generation (DH; First as Genesis G80)"
    start_year: 2016
    end_year: 2020
    description: "The second-generation model (internally designated DH) launched initially as the Hyundai Genesis but was soon rebranded as the Genesis G80 when the luxury division was established as a separate brand in 2016. It featured distinctive styling with a hexagonal grille and a cohesive luxury design language. Available with a 2.0L turbocharged four-cylinder, 3.3L V6, 3.3L twin-turbocharged V6, 3.8L V6, or 5.0L V8 engine, and in rear-wheel or all-wheel drive configurations, it offered a range of performance options. The interior featured significant improvements in materials, design, and technology, offering features comparable to established luxury brands. The G80 Sport variant offered a twin-turbo 3.3L V6 with enhanced styling and dynamics. This generation helped establish Genesis as a standalone luxury brand with its own identity, competing with the likes of Lexus, BMW, and Mercedes-Benz while maintaining a value proposition. Production ran from March 2016 to 2020."

  - name: "Third Generation (RG3)"
    start_year: 2020
    end_year: null
    description: "The current G80 (internally designated RG3) represents a complete redesign that fully embraces Genesis's unique design language, featuring the brand's signature crest grille, quad headlights and taillights, and a dramatic parabolic character line along the side profile. Built on the new Hyundai-Kia M3 platform, it offers improved dynamics, technology, and refinement. Engine options include a 2.5L turbocharged four-cylinder and a 3.5L twin-turbocharged V6, both paired with an eight-speed automatic transmission. The interior showcases a minimalist luxury approach with a focus on materials and craftsmanship, featuring a 14.5-inch widescreen infotainment display and a digital instrument cluster. A facelift introduced in 2024 updated the styling with new headlights and a redesigned grille, along with a new 27-inch OLED display. Technology includes Remote Smart Parking Assist, Highway Driving Assist II, and an augmented reality navigation system. An all-electric Electrified G80 variant was introduced in 2021 with dual electric motors and up to 87.2-94.5 kWh battery, offering approximately 282-312 miles of range depending on battery size. This generation has established the G80 as a distinctive luxury sedan with its own clear identity rather than following established competitors, helping solidify Genesis as a genuine luxury contender. Production began April 2020."
