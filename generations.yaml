generations:
  - name: "First Generation (DH)"
    start_year: 2016
    end_year: 2020
    description: "The first-generation Genesis G80 (internally designated DH) launched as the rebranded Hyundai Genesis when Genesis Motor was established as a separate luxury division in 2016. It featured distinctive styling with a hexagonal grille and Genesis's emerging design language. Available engine options included a 2.0L turbocharged four-cylinder, 3.3L V6, 3.3L twin-turbo V6, 3.8L V6, and 5.0L V8, with rear-wheel or all-wheel drive (HTRAC). The G80 Sport variant offered a twin-turbo 3.3L V6 with enhanced styling and dynamics. Production ran from March 2016 to 2020, with model years 2017-2020. Built on the Hyundai M2 platform at Ulsan, South Korea and Kaliningrad, Russia."

  - name: "Second Generation Pre-Facelift (RG3)"
    start_year: 2020
    end_year: 2024
    description: "The second-generation G80 (internally designated RG3) represents a complete redesign fully embracing Genesis's unique design language. It features the brand's signature crest grille, quad headlights and taillights, and a dramatic parabolic character line along the side profile. Built on the new Hyundai-Kia M3 platform, it offers improved dynamics and refinement. Engine options include a 2.5L turbocharged four-cylinder (Smartstream G2.5), 3.5L twin-turbo V6 (Smartstream G3.5), and a 2.2L diesel (Smartstream D2.2). All paired with an eight-speed automatic transmission. The interior showcases a minimalist luxury approach with a 14.5-inch widescreen infotainment display and digital instrument cluster. The Electrified G80 EV variant debuted in 2021 with dual motors and 87.2 kWh battery. Production began April 2020 for model years 2021-present."

  - name: "Second Generation Facelift (RG3)"
    start_year: 2024
    end_year: null
    description: "The facelifted G80 was revealed on December 14, 2023 for the 2024 model year. Exterior updates include micro-lens array headlight technology, a new grille pattern and front bumper, hidden exhaust outlets with V-shape chrome trim, and redesigned alloy wheels. The interior features a new 27-inch OLED display (replacing the separate digital cluster and infotainment), crystal-like shift-by-wire gear shifter, touch-based climate controls, and a new steering wheel. The G80 Sport adds a unique double-layered G-Matrix pattern grille, larger air outlets, different bumpers, D-cut steering wheel, and carbon-look interior garnishes. The Electrified G80 received an upgraded 95.4 kWh battery (up from 87.2 kWh)."